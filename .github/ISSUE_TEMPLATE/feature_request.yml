name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do with MCP that is hard or unsafe today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would make this better?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rules
        - Doctor
        - Dashboard
        - Packaging
        - Documentation
        - Other
