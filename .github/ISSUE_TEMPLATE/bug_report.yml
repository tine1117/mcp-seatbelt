name: Bug report
description: Report behavior that looks broken or unsafe.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command, config, and redacted MCP message or log excerpt when possible.
      placeholder: |
        npx mcp-seatbelt wrap -- ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: mcp-seatbelt 0.1.0
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Node.js 22
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
